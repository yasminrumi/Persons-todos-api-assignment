openapi: 3.0.0
info:
  title: Persons + Todos API
  description: Token Authenticated API by Yasmin Akter
  version: 1.0.0
  contact:
    name: Yasmin Akter
    email: 2310637@edu.karelia.fi

servers:
  - url: http://localhost:3000
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Person:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Todo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        assigneeId:
          type: string
          format: uuid
          nullable: true
        state:
          type: string
          enum: [todo, doing, done]
        dueDate:
          type: string
          format: date
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    Error:
      type: object
      properties:
        error:
          type: string

security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      security: []
      responses:
        '200':
          description: API is running

  /auth/login:
    post:
      summary: Login to get JWT token
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: Invalid credentials

  /persons:
    get:
      summary: Get all persons
      tags: [Persons]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of persons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Person'
    post:
      summary: Create a new person
      tags: [Persons]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '201':
          description: Person created
        '409':
          description: Email already exists

  /persons/{id}:
    get:
      summary: Get person by ID
      tags: [Persons]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Person found
        '404':
          description: Person not found
    put:
      summary: Update person
      tags: [Persons]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
      responses:
        '200':
          description: Person updated
        '404':
          description: Person not found
    delete:
      summary: Delete person
      tags: [Persons]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Person deleted
        '404':
          description: Person not found

  /persons/{id}/todos:
    get:
      summary: Get todos for a person
      tags: [Persons, Todos]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of todos assigned to person
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'

  /todos:
    get:
      summary: Get all todos with filters
      tags: [Todos]
      security:
        - bearerAuth: []
      parameters:
        - name: assigneeId
          in: query
          required: false
          schema:
            type: string
        - name: unassigned
          in: query
          required: false
          schema:
            type: boolean
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [todo, doing, done]
      responses:
        '200':
          description: List of todos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'
    post:
      summary: Create a new todo
      tags: [Todos]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
                assigneeId:
                  type: string
                  nullable: true
                state:
                  type: string
                  enum: [todo, doing, done]
                  default: todo
                dueDate:
                  type: string
                  format: date
      responses:
        '201':
          description: Todo created
        '400':
          description: Bad request

  /todos/{id}:
    get:
      summary: Get todo by ID
      description: Returns a single todo object by its ID
      tags: [Todos]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: UUID of the todo
      responses:
        '200':
          description: Todo found - returns single todo object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
              example:
                id: "63691774-3c8e-4bbc-9922-ead913816cd2"
                title: "Fix bug in authentication"
                description: "Token validation issue fix"
                assigneeId: "b6fd943f-a0d9-4fd8-a84e-5eac5561caa7"
                state: "doing"
                dueDate: null
                createdAt: "2026-03-05T17:46:41.807Z"
                updatedAt: "2026-03-05T17:46:41.807Z"
        '404':
          description: Todo not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Todo not found"
    put:
      summary: Update todo
      tags: [Todos]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                assigneeId:
                  type: string
                  nullable: true
                state:
                  type: string
                  enum: [todo, doing, done]
                dueDate:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Todo updated
        '404':
          description: Todo not found
    delete:
      summary: Delete todo
      tags: [Todos]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Todo deleted
        '404':
          description: Todo not found